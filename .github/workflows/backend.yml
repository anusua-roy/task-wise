name: Backend CI/CD

on:
  pull_request:
    branches: ["master"]

  push:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Format Check
        run: black --check app tests

      - name: Lint Check
        run: flake8 app tests

      - name: Run Tests
        run: pytest

      - name: Validate Docker Build
        run: docker build -t taskwise-backend .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR (Runner)
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin 736578948084.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build -t taskwise-backend:${{ github.sha }} .

      - name: Tag Docker Image
        run: |
          docker tag taskwise-backend:${{ github.sha }} \
          736578948084.dkr.ecr.ap-south-1.amazonaws.com/taskwise-backend:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push 736578948084.dkr.ecr.ap-south-1.amazonaws.com/taskwise-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Logging into ECR on EC2..."
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin 736578948084.dkr.ecr.ap-south-1.amazonaws.com

            echo "Stopping existing container..."
            docker rm -f taskwise || true

            echo "Pulling new image..."
            docker pull 736578948084.dkr.ecr.ap-south-1.amazonaws.com/taskwise-backend:${{ github.sha }}

            echo "Starting new container..."
            docker run -d \
              --name taskwise \
              --restart unless-stopped \
              -p 8000:8000 \
              -v ~/taskwise-data:/app/data \
              -e DATABASE_URL=sqlite:///./data/taskwise.db \
              736578948084.dkr.ecr.ap-south-1.amazonaws.com/taskwise-backend:${{ github.sha }}

            echo "Running seed script..."
            docker exec -e RESET_DB=true taskwise python -m app.seed

            echo "Deployment completed successfully."